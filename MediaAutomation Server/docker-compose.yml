version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: app/Dockerfile
    image: obs_backend:prod
    container_name: obs_backend
    env_file:
      - ./app/.env.app
    volumes:
      - ./app/config.json:/app/config.json:ro
      - ./secrets:/app/secrets:ro
      - ./data:/app/data
      - ./app/logs:/app/logs
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - obsnet
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: obs_frontend:prod
    container_name: obs_frontend
    env_file:
      - ./frontend/.env.frontend
    volumes:
      - ./frontend/static_assets:/usr/share/nginx/html/static:ro # opcional, se tiver assets externos
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - obsnet
    depends_on:
      - backend

networks:
  obsnet:
    driver: bridge
