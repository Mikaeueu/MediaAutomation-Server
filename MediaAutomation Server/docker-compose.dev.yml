version: "3.8"
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app:delegated
      - ./secrets:/app/secrets:ro
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app:delegated
      # Persist node_modules dentro do container para evitar reinstalar no host
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env.frontend
    depends_on:
      - backend

volumes:
  frontend_node_modules:
